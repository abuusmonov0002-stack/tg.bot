<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; color: #333; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin: 10px auto; max-width: 300px; 
                box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
        .active { display: block; border-left: 5px solid #0088cc; }
        h1 { color: #0088cc; font-size: 20px; }
    </style>
</head>
<body>
    <h1>Mavzular paneli</h1>
    <p id="welcome-msg">Yuklanmoqda...</p>

    <div id="topic-Umumiy" class="card">
    <h3>📂 Umumiy bo'lim</h3>
    <p>Hamma uchun ochiq ma'lumotlar.</p>
    <button onclick="tg.close()">Yopish</button>
</div>

<div id="topic-Dasturlash" class="card">
    <h3>💻 Dasturlash</h3>
    <p>Python va Ma'lumotlar bazasi darslari.</p>
    <button onclick="location.href='https://google.com'">Darsni boshlash</button>
</div>

<div id="topic-Dizayn" class="card">
    <h3>🎨 Dizayn</h3>
    <p>Grafik dizayn bo'yicha qo'llanmalar.</p>
    <button onclick="tg.showAlert('Tez kunda qo\'shiladi!')">Ma'lumot</button>
</div>

<style>
    /* Tugmalar uchun chiroyli stil */
    button {
        background-color: #0088cc;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        margin-top: 10px;
    }
    button:active { background-color: #006699; }
</style>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Oynani to'liq ekranga yoyish

        const user = tg.initDataUnsafe.user;
        document.getElementById('welcome-msg').innerText = `Xush kelibsiz, ${user.first_name}!`;

        // URL'dan ruxsatlarni o'qish (Buni keyingi qadamda bot yuboradi)
        const urlParams = new URLSearchParams(window.location.search);
        const access = urlParams.get('access') || ""; // Masalan: "Umumiy,Dasturlash"
        
        const allowedTopics = access.split(',');

        allowedTopics.forEach(topic => {
            const element = document.getElementById('topic-' + topic.trim());
            if (element) {
                element.classList.add('active');
            }
        });
    </script>
</body>
</html>
